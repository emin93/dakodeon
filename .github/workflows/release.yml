name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build app archive
        run: make zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Dakodeon.zip
